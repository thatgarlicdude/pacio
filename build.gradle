plugins {
	// Apply the java-library plugin for API and implementation separation.
	id 'java-library'
	id 'maven-publish'
	id 'signing'
}

group = "io.github.thatgarlicdude"
version = "1.0.3-alpha"

repositories {
	// Use Maven Central for resolving dependencies.
	mavenCentral()
}

dependencies {
	// Use JUnit test framework.
	testImplementation libs.junit
}

// Apply a specific Java toolchain to ease working on different environments.
java {
	sourceCompatibility = JavaVersion.VERSION_1_8
	targetCompatibility = JavaVersion.VERSION_1_8

	toolchain {
		languageVersion = JavaLanguageVersion.of(8)
	}
	
	withSourcesJar()
	withJavadocJar()
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
			
			artifactId = 'pacio'
			
			pom {
				name = 'PacIO'
				description = 'Pac-Man ROM Set IO Library'
				url = 'https://github.com/thatgarlicdude/pacio'
				
				inceptionYear = '2026'
				
				licenses {
					license {
						name = 'MIT License'
						url = 'https://opensource.org/license/mit/'
						distribution = 'repo'
					}
				}
				
				developers {
					developer {
						id = 'thatgarlicdude'
						name = 'GarlicDude'
						url = 'https://github.com/thatgarlicdude'
					}
				}
				
				scm {
					connection = 'scm:git:git://github.com/thatgarlicdude/pacio.git'
					developerConnection = 'scm:git:ssh://github.com/thatgarlicdude/pacio.git'
					url = 'https://github.com/thatgarlicdude/pacio'
				}
				
				issueManagement {
					system = 'GitHub Issues'
					url = 'https://github.com/thatgarlicdude/pacio/issues'
				}
				
				ciManagement {
					system = 'GitHub Actions'
					url = 'https://github.com/thatgarlicdude/pacio/actions'
				}
				
				mailingLists {
					mailingList {
						name = 'GitHub Discussions'
						post = 'https://github.com/thatgarlicdude/pacio/discussions'
					}
				}
			}
		}
	}
}

signing {

	useInMemoryPgpKeys(
		findProperty("signingKey"),
		findProperty("signingPassword")
	)
	
	sign publishing.publications.mavenJava
}
