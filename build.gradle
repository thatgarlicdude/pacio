plugins {
	// Apply the java-library plugin for API and implementation separation.
	id 'java-library'
	id 'maven-publish'
	id 'signing'
}

group = "io.github.thatgarlicdude"
version = "1.0.3-alpha"

repositories {
	// Use Maven Central for resolving dependencies.
	mavenCentral()
}

dependencies {
	// Use JUnit test framework.
	testImplementation libs.junit
}

// Apply a specific Java toolchain to ease working on different environments.
java {
	sourceCompatibility = JavaVersion.VERSION_1_8
	targetCompatibility = JavaVersion.VERSION_1_8

	toolchain {
		languageVersion = JavaLanguageVersion.of(8)
	}
	
	withSourcesJar()
	withJavadocJar()
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
			
			pom {
				name = 'PacIO'
				description = 'Pac-Man ROM Set IO Library'
				url = 'https://github.com/thatgarlicdude/pacio'
				
				inceptionYear = '2026'
				
				licenses {
					license {
						name = 'MIT License'
						url = 'https://opensource.org/license/mit/'
					}
				}
				
				developers {
					developer {
						id = 'thatgarlicdude'
						name = 'GarlicDude'
						url = 'https://github.com/thatgarlicdude'
					}
				}
				
				scm {
					connection = 'scm:git:git://github.com/thatgarlicdude/pacio.git'
					developerConnection = 'scm:git:ssh://github.com/thatgarlicdude/pacio.git'
					url = 'https://github.com/thatgarlicdude/pacio'
				}
				
				properties {
					property 'maven.compiler.source', '1.8'
					property 'maven.compiler.target', '1.8'
					property 'project.build.sourceEncoding', 'UTF-8'
				}
			}
		}
	}
	
	repositories {
		maven {
			name = "central"
			url = uri("https://central.sonatype.com/api/v1/publisher")
			
			credentials {
				username = project.findProperty("mavenCentralUsername")
				password = project.findProperty("mavenCentralPassword")
			}
		}
	}
}
